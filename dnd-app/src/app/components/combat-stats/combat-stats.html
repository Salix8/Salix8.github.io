<div class="combat-stats-grid">
  <!-- Top Row: Badges -->
  <div class="badges-row">
    <mat-card class="stat-badge">
      <div class="stat-badge__label">Initiative</div>
      <div class="stat-badge__value init-value">{{ formatMod(initiative()) }}</div>
    </mat-card>

    <mat-card class="stat-badge ac-badge">
      <div class="stat-badge__label">Armor Class</div>
      <input type="number" class="stat-badge__input" 
             [value]="character().armorClass !== null ? character().armorClass : ac()" 
             [placeholder]="ac().toString()"
             (change)="updateAC($event)">
      <mat-icon class="shield-icon">security</mat-icon>
    </mat-card>

    <mat-card class="stat-badge">
      <div class="stat-badge__label">Speed (ft)</div>
      <input type="number" class="stat-badge__input plain-input" 
             [value]="character().speed" 
             (change)="updateSpeed($event)">
    </mat-card>
  </div>

  <!-- Hit Points -->
  <mat-card class="hp-panel">
    <div class="panel-header">Hit Points</div>
    <div class="hp-grid">
      <mat-form-field appearance="outline" class="dense-field">
        <mat-label>Max HP</mat-label>
        <input matInput type="number" min="1" [value]="character().hitPoints.max" (change)="updateHPMax($event)">
      </mat-form-field>

      <mat-form-field appearance="outline" class="dense-field">
        <mat-label>Current HP</mat-label>
        <input matInput type="text" [value]="character().hitPoints.current" 
               (change)="handleHPMath($event, 'current')"
               placeholder="e.g. +5 or -3">
      </mat-form-field>

      <mat-form-field appearance="outline" class="dense-field">
        <mat-label>Temp HP</mat-label>
        <input matInput type="text" [value]="character().hitPoints.temporary" 
               (change)="handleHPMath($event, 'temporary')"
               placeholder="e.g. +5 or -3">
      </mat-form-field>
    </div>
  </mat-card>

  <!-- Hit Dice & Exhaustion -->
  <div class="secondary-stats">
    <mat-card class="hd-panel">
      <div class="panel-header">Hit Dice</div>
      <div class="hd-grid">
        <mat-form-field appearance="outline" class="dense-field">
          <mat-label>Total (e.g. d8)</mat-label>
          <input matInput type="text" [value]="character().hitDice" (change)="updateHitDice($event)">
        </mat-form-field>
        <mat-form-field appearance="outline" class="dense-field">
          <mat-label>Spent</mat-label>
          <input matInput type="number" min="0" [max]="character().level" [value]="character().hitDiceSpent || 0" (change)="updateHitDiceSpent($event)">
        </mat-form-field>
      </div>
    </mat-card>

    <mat-card class="ex-panel">
      <div class="panel-header">Exhaustion</div>
      <mat-form-field appearance="outline" class="dense-field">
        <input matInput type="number" min="0" max="6" [value]="character().exhaustion" (change)="updateExhaustion($event)">
        <span matSuffix>/ 6</span>
      </mat-form-field>
    </mat-card>
  </div>
</div>

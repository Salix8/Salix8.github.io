<div class="combat-stats-grid">
  <!-- Top Row: Badges -->
  <div class="badges-row">
    <mat-card class="stat-badge">
      <div class="stat-badge__label">Initiative</div>
      <div class="stat-badge__value init-value">{{ formatMod(initiative()) }}</div>
    </mat-card>

    <mat-card class="stat-badge ac-badge">
      <div class="stat-badge__label">Armor Class</div>
      <input type="number" class="stat-badge__input" 
             [value]="character().armorClass !== null ? character().armorClass : ac()" 
             [placeholder]="ac().toString()"
             (change)="updateAC($event)"
             (focus)="$event.target.select()">
      <mat-icon class="shield-icon">security</mat-icon>
    </mat-card>

  </div>

  <!-- Hit Points -->
  <mat-card class="hp-panel">
    <div class="panel-header">Hit Points</div>
    <div class="hp-grid">
      <mat-form-field appearance="outline" class="dense-field">
        <mat-label>Max HP</mat-label>
        <input matInput type="number" min="1" [value]="character().hitPoints.max" (change)="updateHPMax($event)" (focus)="$event.target.select()">
      </mat-form-field>

      <mat-form-field appearance="outline" class="dense-field">
        <mat-label>Current HP</mat-label>
        <input matInput type="text" [value]="character().hitPoints.current" 
               (change)="handleHPMath($event, 'current')"
               (focus)="$event.target.select()"
               placeholder="e.g. +5 or -3">
      </mat-form-field>

      <mat-form-field appearance="outline" class="dense-field">
        <mat-label>Temp HP</mat-label>
        <input matInput type="text" [value]="character().hitPoints.temporary" 
               (change)="handleHPMath($event, 'temporary')"
               (focus)="$event.target.select()"
               placeholder="e.g. +5 or -3">
      </mat-form-field>
    </div>
  </mat-card>
</div>

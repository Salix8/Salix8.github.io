<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Salix8 — D&D Character Creator. Build your level 1 character.">
  <title>Salix8 — Character Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../css/dnd.css">
</head>
<body>
  <div class="bg-glow"></div>

  <div class="page-wrapper">
    <div class="container">

      <a href="../" class="back-link" id="back-dnd">← Back to D&D Hub</a>

      <!-- ===== CHARACTER HEADER ===== -->
      <div class="char-header">
        <input type="text" class="char-name-input" id="char-name" placeholder="Character Name" autocomplete="off">
        <div class="char-meta">
          <div class="char-field">
            <label for="char-race">Race</label>
            <input type="text" id="char-race" placeholder="e.g. Human" autocomplete="off">
          </div>
          <div class="char-field">
            <label for="char-class">Class</label>
            <input type="text" id="char-class" placeholder="e.g. Fighter" autocomplete="off">
          </div>
          <div class="char-field">
            <label for="char-level">Level</label>
            <input type="number" id="char-level" value="1" min="1" max="20">
          </div>
          <div class="char-field">
            <label for="char-background">Background</label>
            <input type="text" id="char-background" placeholder="e.g. Soldier" autocomplete="off">
          </div>
        </div>
      </div>

      <!-- ===== CHARACTER SHEET ===== -->
      <div class="char-sheet">

        <!-- TOP ROW: Abilities + Init + AC + HP -->
        <div class="sheet-main-row">

          <div class="abilities-row-6" id="abilities-row">
            <!-- Generated by creator.js -->
          </div>

          <div class="top-combat-hp">
            <div class="stat-badge">
              <span class="stat-badge__label">Initiative</span>
              <span class="stat-badge__value" id="stat-init">+0</span>
            </div>

            <div class="stat-badge stat-badge--ac">
              <span class="stat-badge__label">Armor Class</span>
              <input type="number" class="stat-badge__input" id="stat-ac" value="10" min="1" max="30">
              <label class="stat-badge__unit">
                <input type="checkbox" id="ac-override" style="margin-right:4px">manual
              </label>
            </div>

            <div class="hp-panel sheet-panel">
              <h3 class="sheet-panel__title" style="margin-bottom:0.5rem; text-align:center;">Hit Points</h3>
              <div class="hp-group">
                <div class="hp-field">
                  <label for="hp-max">Max</label>
                  <input type="number" id="hp-max" value="10" min="1">
                </div>
                <div class="hp-field hp-field--current">
                  <label for="hp-current">Current</label>
                  <input type="text" id="hp-current" value="10" autocomplete="off" placeholder="e.g. +2">
                </div>
                <div class="hp-field hp-field--temp">
                  <label for="hp-temp">Temp</label>
                  <input type="number" id="hp-temp" value="0" min="0">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- LOWER SECTION (2-COLUMN) -->
        <div class="char-sheet-split">

          <!-- LEFT COLUMN -->
          <div class="sheet-left">
            <!-- SKILLS -->
            <section class="skills-section sheet-panel">
              <h3 class="sheet-panel__title">Skills</h3>
              <div class="skills-list" id="skills-list">
                <!-- Generated by creator.js -->
              </div>
            </section>
          </div>

          <!-- RIGHT COLUMN -->
          <div class="sheet-right">

            <!-- RIGHT MIDDLE: Prof, Speed, Hit Dice -->
            <div class="sheet-secondary-row">
              <div class="stat-badge stat-badge--narrow" style="min-width: 80px; flex: 0;">
                <span class="stat-badge__label">Prof</span>
                <span class="stat-badge__value" id="stat-prof">+2</span>
              </div>

              <div class="stat-badge stat-badge--narrow" style="min-width: 80px; flex: 0;">
                <span class="stat-badge__label">Speed</span>
                <input type="number" class="stat-badge__input" id="stat-speed" value="30" min="0" max="999">
                <span class="stat-badge__unit">ft</span>
              </div>

              <div class="sheet-panel hd-panel" style="flex: 2;">
                <h3 class="sheet-panel__title">Hit Dice</h3>
                <div class="hd-content" style="flex-direction: row; gap: 1rem; flex-wrap: wrap;">
                  <div class="hd-tracker">
                    <input type="number" id="hd-spent" value="0" min="0" class="dnd-input" style="width:45px; text-align:center;">
                    <span class="hd-divider" style="padding: 0 0.25rem;">/</span>
                    <span id="hd-total" class="hd-total">1</span>
                  </div>
                  <select id="hit-dice" class="dnd-input" style="width: 70px;">
                    <option value="d6">d6</option>
                    <option value="d8" selected>d8</option>
                    <option value="d10">d10</option>
                    <option value="d12">d12</option>
                  </select>
                </div>
              </div>

              <!-- Death saves commented out directly by user -->
              <!-- <div class="sheet-panel ds-panel"> ... </div> -->
            </div>

            <!-- RIGHT BOTTOM: Features & Notes -->
            <section class="modules-section sheet-panel" style="margin-top: 1.5rem">
              <h3 class="sheet-panel__title">Features &amp; Traits</h3>
              <div class="modules-list" id="modules-list"></div>
              <button type="button" class="btn--add-module" id="add-module">+ Add Module</button>
            </section>

            <section class="notes-section sheet-panel" style="margin-top: 1.5rem">
              <h3 class="sheet-panel__title">Notes</h3>
              <textarea id="char-notes" placeholder="Write your notes here..."></textarea>
            </section>

          </div>
        </div>
      </div>

      <!-- ACTION BAR -->
      <div class="action-bar">
        <button type="button" class="btn btn--primary" id="save-char">💾 Save Character</button>
        <button type="button" class="btn btn--outline" id="export-char" style="display:none">📤 Export JSON</button>
      </div>

    </div>

    <footer class="site-footer">
      <p>&copy; 2026 Salix8</p>
    </footer>
  </div>

  <script src="../js/utils/helpers.js"></script>
  <script src="../js/models/character.js"></script>
  <script src="../js/storage/storage.js"></script>
  <script src="../js/creator/creator.js"></script>
</body>
</html>
